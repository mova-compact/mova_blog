<meta charset="utf-8">
<title>{% if page.seo_title %}{{ page.seo_title }}{% else %}{{ page.title | append: ' - ' | append: site.title }}{% endif %}</title>
<meta name="description" content="{% if page.seo_description %}{{ page.seo_description }}{% elsif page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">

<link rel="canonical" href="{{ page.url | absolute_url }}">
